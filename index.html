<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멍 Knowledge System</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

:root{
--pink:#ffd6e7;
--green:#dff5e1;
--pink-strong:#ff9ec5;
--green-strong:#8ed39a;
--bg:#fffafc;
}

body{
font-family:Arial;
margin:0;
background:var(--bg);
}

header{
background:linear-gradient(90deg,var(--pink),var(--green));
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

section{
padding:16px;
}

input,textarea{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:8px;
}

textarea{
height:150px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:var(--green);
cursor:pointer;
}

.list{
background:white;
border-radius:10px;
padding:10px;
margin-top:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.noteItem{
padding:6px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.tag{
background:var(--pink);
padding:2px 6px;
border-radius:6px;
font-size:12px;
margin-right:4px;
}

.container{
display:flex;
gap:16px;
overflow-x:auto;
}

.column{
background:white;
border-radius:12px;
min-width:220px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card{
background:var(--pink);
padding:6px;
margin:6px 0;
border-radius:6px;
cursor:grab;
}

.chart{
display:flex;
align-items:flex-end;
height:120px;
gap:6px;
}

.bar{
width:14px;
background:var(--green-strong);
}

</style>
</head>

<body>

<header>🌸 Inspection Master 🌱</header>

<section>

<section>

<h2>🧠 칸반 보드</h2>

<div class="container">

<div class="column" data-col="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
<h3>TODO</h3>
<button onclick="addCard(this)">+</button>
</div>

<div class="column" data-col="doing" ondrop="drop(event)" ondragover="allowDrop(event)">
<h3>DOING</h3>
<button onclick="addCard(this)">+</button>
</div>

<div class="column" data-col="done" ondrop="drop(event)" ondragover="allowDrop(event)">
<h3>DONE</h3>
<button onclick="addCard(this)">+</button>
</div>

</div>

</section>
  

<h2>📚 노트 작성</h2>

<input id="noteTitle" placeholder="노트 제목">
<input id="noteTags" placeholder="태그 입력 (#AXI #SPC 등)">
<textarea id="noteContent" placeholder="지식 기록 / 시스템 분석"></textarea>

<button onclick="saveNote()">노트 저장</button>

</section>


<section>

<h2>🔎 태그 검색</h2>

<input id="searchTag" placeholder="#AXI">
<button onclick="searchTag()">검색</button>
<button onclick="loadNotes()">전체보기</button>

</section>


<section>

<h2>📑 노트 목록</h2>
<div id="noteList" class="list"></div>

<h2>📄 노트 보기</h2>
<div id="noteViewer" class="list">
노트를 선택하면 내용이 표시됩니다.
</div>

</section>


<section>

<h2>📊 공부 시간</h2>

<input id="studyInput" type="number" placeholder="시간">
<button onclick="addStudy()">기록</button>

<div class="chart" id="chart"></div>

</section>

<script>

/* Firebase 설정 */

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "mung-lab.firebaseapp.com",
  projectId: "mung-lab",
  storageBucket: "mung-lab.firebasestorage.app",
  messagingSenderId: "518423907575",
  appId: "1:518423907575:web:9445a98623c7197ba0d7f2"
};

firebase.initializeApp(firebaseConfig)
const db = firebase.firestore()


let studyData=[]


/* 노트 저장 */

async function saveNote(){

const title=document.getElementById("noteTitle").value
const tags=document.getElementById("noteTags").value
const content=document.getElementById("noteContent").value

if(!title) return

try{

await db.collection("notes").add({
title,
tags,
content,
date:new Date()
})

loadNotes()

}catch(e){

console.error(e)

}

}



/* 노트 보기 */

function showNote(note){

const viewer=document.getElementById("noteViewer")

let tagHTML=""

if(note.tags){

note.tags.split(" ").forEach(t=>{
tagHTML+=`<span class="tag">${t}</span>`
})

}

viewer.innerHTML=`
<h3>${note.title}</h3>
<div>${tagHTML}</div>
<hr>
<p style="white-space:pre-line">${note.content}</p>
`

}



/* 전체 노트 불러오기 */

async function loadNotes(){

const list=document.getElementById("noteList")

list.innerHTML=""

const snapshot=await db.collection("notes")
.orderBy("date","desc")
.get()

snapshot.forEach(doc=>{

const d=doc.data()

const div=document.createElement("div")

div.className="noteItem"
div.innerHTML=d.title

div.onclick=()=>{
showNote(d)
}

list.appendChild(div)

})

}



/* 태그 검색 */

async function searchTag(){

const tag=document.getElementById("searchTag").value

const list=document.getElementById("noteList")

list.innerHTML=""

const snapshot=await db.collection("notes").get()

snapshot.forEach(doc=>{

const d=doc.data()

if(d.tags && d.tags.includes(tag)){

const div=document.createElement("div")

div.className="noteItem"
div.innerHTML=d.title

div.onclick=()=>{
showNote(d)
}

list.appendChild(div)

}

})

}



/* 공부 시간 */

function addStudy(){

const input=document.getElementById("studyInput")

const v=input.value

if(!v) return

studyData.push(Number(v))

localStorage.setItem("studyData",JSON.stringify(studyData))

input.value=""

renderChart()

}


function renderChart(){

const chart=document.getElementById("chart")

chart.innerHTML=""

studyData.slice(-12).forEach(h=>{

const b=document.createElement("div")

b.className="bar"

b.style.height=(h*10)+"px"

chart.appendChild(b)

})

}



/* Kanban */

function allowDrop(e){
e.preventDefault()
}

function drag(e){
e.dataTransfer.setData("id",e.target.id)
}

function drop(e){

e.preventDefault()

const id=e.dataTransfer.getData("id")

const card=document.getElementById(id)

const column=e.target.closest(".column")

column.appendChild(card)

let cards=JSON.parse(localStorage.getItem("kanban")||"[]")

cards.forEach(c=>{
if(c.id==id){
c.col=column.dataset.col
}
})

localStorage.setItem("kanban",JSON.stringify(cards))

}


function addCard(btn){

const text=prompt("내용")

if(!text) return

const column=btn.parentElement.dataset.col

const card={
id:"card_"+Date.now(),
text:text,
col:column
}

let cards=JSON.parse(localStorage.getItem("kanban")||"[]")

cards.push(card)

localStorage.setItem("kanban",JSON.stringify(cards))

renderKanban()

}


function deleteCard(e){

if(!confirm("카드를 삭제할까요?")) return

const id=e.target.id

let cards=JSON.parse(localStorage.getItem("kanban")||"[]")

cards=cards.filter(c=>c.id!==id)

localStorage.setItem("kanban",JSON.stringify(cards))

renderKanban()

}


function renderKanban(){

const cards=JSON.parse(localStorage.getItem("kanban")||"[]")

document.querySelectorAll(".card").forEach(c=>c.remove())

cards.forEach(card=>{

const column=document.querySelector(`[data-col="${card.col}"]`)

const c=document.createElement("div")

c.className="card"
c.innerText=card.text
c.id=card.id
c.draggable=true
c.ondragstart=drag
c.ondblclick=deleteCard

column.appendChild(c)

})

}


/* 초기 로드 */

loadNotes()

studyData=JSON.parse(localStorage.getItem("studyData")||"[]")

renderChart()
renderKanban()

</script>

</body>
</html>
